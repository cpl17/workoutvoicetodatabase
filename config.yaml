# Workout Voice Memo Tracker — project configuration
# Paths are relative to the repo root (directory containing this file).

paths:
  voice_memos: voice-memos
  transcripts: transcripts
  data: data

# Transcription backend (Phase 0b): faster_whisper/small keeps audio on-device and
# matched OpenAI on gym memos in side-by-side testing. OpenAI remains available
# via backend: openai — switch in config to retry edge cases (e.g. rep-count memos).
transcription:
  backend: faster_whisper   # faster_whisper | openai
  model: small              # openai: whisper-1 | faster_whisper: small, medium, etc.
  language: en              # ISO-639-1; omit or null for auto-detect

parsing:
  backend: openai          # Phase 1
  model: gpt-4o-mini
  schema_version: v1
  confidence_threshold: 0.75
